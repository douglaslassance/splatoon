name: Splatoon
options:
  bundleIdPrefix: me.douglaslassance
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"

packages:
  MetalSplatter:
    url: https://github.com/scier/MetalSplatter
    exactVersion: 1.0.1

targets:
  Splatoon:
    type: application
    platform: macOS
    sources:
      - path: Sources/Splatoon
    dependencies:
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO
      - package: MetalSplatter
        product: PLYIO
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: Splatoon
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.graphics-design
        NSHighResolutionCapable: true
        NSPhotoLibraryUsageDescription: "Splatoon reads your photos so you can turn them into 3D Gaussian splats. Images are processed on your device."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.douglaslassance.splatoon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
